<div class="ramadan-widget">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;600;700&display=swap');

        .ramadan-widget {
            font-family: 'Noto Serif Bengali', serif;
            width: 300px;
            height: 100px;
            display: flex;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            background: linear-gradient(to bottom right, #f3f4f6, #ffffff);
            border: 1px solid #e5e7eb;
        }

        /* Desktop */
        @media (min-width: 768px) {
            .ramadan-widget {
                width: 590px;
                height: 70px;
            }
        }

        /* Left Ad Section */
        .ramadan-ad {
            width: 110px;
            height: 100%;
            background: rgb(231, 242, 244);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (min-width: 768px) {
            .ramadan-ad {
                width: 250px;
            }
        }

        .ramadan-ad img {
            max-height: 70px;
            max-width: 100%;
            object-fit: contain;
        }

        /* Divider */
        .ramadan-divider {
            width: 1px;
            background: #e5e7eb;
        }

        /* Countdown Section */
        .ramadan-content {
            flex: 1;
            padding: 6px 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-image: url('https://static.bonikbarta.com/images/RAMADAN-SEHRI-IFTAR_fff.jpg.original.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            color: #ffffff;
        }

        /* overlay for readability */
        .ramadan-content::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0);
        }

        .ramadan-inner {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        /* Label */
        .ramadan-label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Live Dot */
        .ramadan-live-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            animation: ramadanPulse 1.5s infinite;
        }

        @keyframes ramadanPulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        /* Countdown Row */
        .ramadan-countdown {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .ramadan-box-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ramadan-box {
            width: 36px;
            height: 32px;
            background: #f1f5f9;
            color: #1e293b;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        @media (min-width: 768px) {
            .ramadan-box {
                height: 28px;
            }
        }

        .ramadan-unit {
            font-size: 10px;
            margin-top: 3px;
        }
    </style>

    <!-- Ad Section -->
    <a href="https://bonikbarta.com/iftar-and-sehri-time" class="ramadan-ad">
        <img src="https://static.bonikbarta.com/images/raja_metal_update.original.jpg" alt="Advertisement">
    </a>

    <div class="ramadan-divider"></div>

    <!-- Countdown Section -->
    <div class="ramadan-content">
        <div class="ramadan-inner">

            <div class="ramadan-label">
                <span class="ramadan-live-dot"></span>
                <span id="ramadan-label">লোড হচ্ছে...</span>
            </div>

            <div class="ramadan-countdown">

                <div class="ramadan-box-container">
                    <div class="ramadan-box" id="ramadan-hours">০০</div>
                    <div class="ramadan-unit">ঘন্টা</div>
                </div>

                <div class="ramadan-box-container">
                    <div class="ramadan-box" id="ramadan-minutes">০০</div>
                    <div class="ramadan-unit">মিনিট</div>
                </div>

                <div class="ramadan-box-container">
                    <div class="ramadan-box" id="ramadan-seconds">০০</div>
                    <div class="ramadan-unit">সেকেন্ড</div>
                </div>

            </div>

        </div>
    </div>
</div>

<script>
    (function () {

        const timings = [
            { date: '2026-02-19', sehri: '05:12 AM', iftar: '05:58 PM' },
            { date: '2026-02-20', sehri: '05:11 AM', iftar: '05:58 PM' },
            { date: '2026-02-21', sehri: '05:11 AM', iftar: '05:59 PM' },
            { date: '2026-02-22', sehri: '05:10 AM', iftar: '05:59 PM' },
            { date: '2026-02-23', sehri: '05:09 AM', iftar: '06:00 PM' },
            { date: '2026-02-24', sehri: '05:08 AM', iftar: '06:00 PM' },
            { date: '2026-02-25', sehri: '05:08 AM', iftar: '06:01 PM' },
            { date: '2026-02-26', sehri: '05:07 AM', iftar: '06:01 PM' },
            { date: '2026-02-27', sehri: '05:06 AM', iftar: '06:02 PM' },
            { date: '2026-02-28', sehri: '05:05 AM', iftar: '06:02 PM' },
            { date: '2026-03-01', sehri: '05:05 AM', iftar: '06:02 PM' },
            { date: '2026-03-02', sehri: '05:04 AM', iftar: '06:03 PM' },
            { date: '2026-03-03', sehri: '05:03 AM', iftar: '06:03 PM' },
            { date: '2026-03-04', sehri: '05:02 AM', iftar: '06:04 PM' },
            { date: '2026-03-05', sehri: '05:01 AM', iftar: '06:04 PM' },
            { date: '2026-03-06', sehri: '05:00 AM', iftar: '06:05 PM' },
            { date: '2026-03-07', sehri: '04:59 AM', iftar: '06:05 PM' },
            { date: '2026-03-08', sehri: '04:58 AM', iftar: '06:06 PM' },
            { date: '2026-03-09', sehri: '04:57 AM', iftar: '06:07 PM' },
            { date: '2026-03-10', sehri: '04:57 AM', iftar: '06:07 PM' },
            { date: '2026-03-11', sehri: '04:56 AM', iftar: '06:07 PM' },
            { date: '2026-03-12', sehri: '04:55 AM', iftar: '06:08 PM' },
            { date: '2026-03-13', sehri: '04:54 AM', iftar: '06:08 PM' },
            { date: '2026-03-14', sehri: '04:53 AM', iftar: '06:09 PM' },
            { date: '2026-03-15', sehri: '04:52 AM', iftar: '06:09 PM' },
            { date: '2026-03-16', sehri: '04:51 AM', iftar: '06:10 PM' },
            { date: '2026-03-17', sehri: '04:50 AM', iftar: '06:10 PM' },
            { date: '2026-03-18', sehri: '04:49 AM', iftar: '06:10 PM' },
            { date: '2026-03-19', sehri: '04:48 AM', iftar: '06:11 PM' },
            { date: '2026-03-20', sehri: '04:47 AM', iftar: '06:11 PM' }
        ];

        const digits = ['০', '১', '২', '৩', '৪', '৫', '৬', '৭', '৮', '৯'];
        const toBn = n => n.toString().padStart(2, '0').split('').map(d => digits[d]).join('');

        const toBnTime = t => {
            const [h, m, p] = t.match(/(\d+):(\d+) (AM|PM)/).slice(1);
            return `${p === 'AM' ? 'ভোর' : 'সন্ধ্যা'} ${toBn(h)}:${toBn(m)}`;
        };

        function getNext() {
            const now = new Date();
            for (const t of timings) {
                const s = new Date(`${t.date} ${t.sehri}`);
                const i = new Date(`${t.date} ${t.iftar}`);
                if (now < s) return { label: `সেহরির শেষ - ${toBnTime(t.sehri)}`, target: s };
                if (now < i) return { label: `ইফতার - ${toBnTime(t.iftar)}`, target: i };
            }
            return null;
        }

        function update() {
            const e = getNext();
            if (!e) return;

            document.getElementById('ramadan-label').textContent = e.label;

            const d = e.target - new Date();
            document.getElementById('ramadan-hours').textContent = toBn(Math.floor(d / 36e5) % 24);
            document.getElementById('ramadan-minutes').textContent = toBn(Math.floor(d / 6e4) % 60);
            document.getElementById('ramadan-seconds').textContent = toBn(Math.floor(d / 1000) % 60);
        }

        update();
        setInterval(update, 1000);

    })();
</script>
